name: Release

# Go modules publish via tag — pushing a v*.*.* tag makes the module
# discoverable at proxy.golang.org. No build step needed for Go itself.
# This workflow just produces a GitHub Release for the tag with a changelog.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - run: go test ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
